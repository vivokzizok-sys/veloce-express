name: veloce_express
description: Nawdli express, a premium logistics marketplace with bidding system.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase ─────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.1.0
  cloud_functions: ^5.1.3
  flutter_local_notifications: ^18.0.1

  # ── State Management ─────────────────────────────────────
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # ── Navigation ───────────────────────────────────────────
  go_router: ^14.2.7

  # ── Maps & Location ──────────────────────────────────────
  geolocator: ^12.0.0

  # ── Image ────────────────────────────────────────────────
  image_picker: ^1.1.2

  # ── Networking / Utils ───────────────────────────────────
  url_launcher: ^6.3.0
  dartz: ^0.10.1
  logger: ^2.4.0
  shared_preferences: ^2.3.2

  # ── UI / Animations ──────────────────────────────────────
  lottie: ^3.1.2
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#D60000"
  adaptive_icon_foreground: assets/images/app_icon.png
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/videos/
