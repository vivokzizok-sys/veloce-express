name: Android Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.9"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Prepare Android Gradle wrapper
        run: chmod +x android/gradlew

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/veloce-express-release-key.jks
            {
              echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
              echo "keyPassword=$ANDROID_KEY_PASSWORD"
              echo "keyAlias=$ANDROID_KEY_ALIAS"
              echo "storeFile=app/veloce-express-release-key.jks"
            } > android/key.properties
          else
            echo "Release signing secrets are not configured. APKs will be release builds signed with the local debug fallback."
          fi

      - name: Build release APKs
        run: flutter build apk --release --split-per-abi --tree-shake-icons

      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/nawdli-express-arm64.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/nawdli-express-armv7.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/nawdli-express-x86_64.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nawdli-express-release-apks
          path: build/app/outputs/flutter-apk/nawdli-express-*.apk

      - name: Publish APKs to GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Nawdli express Android APK
          body: |
            Latest Android APK files for Nawdli express.

            If one APK does not install on a device, try another architecture file.
          make_latest: true
          overwrite_files: true
          files: |
            build/app/outputs/flutter-apk/nawdli-express-arm64.apk
            build/app/outputs/flutter-apk/nawdli-express-armv7.apk
            build/app/outputs/flutter-apk/nawdli-express-x86_64.apk
