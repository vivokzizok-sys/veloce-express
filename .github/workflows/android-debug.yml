name: Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare Android Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/veloce-express.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: veloce-express-debug-apk
          path: build/app/outputs/flutter-apk/veloce-express.apk
